<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .users-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .users-section h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .user-list {
            list-style: none;
        }
        
        .user-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-item:last-child {
            border-bottom: none;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .user-username {
            color: #999;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Telegram Bot Dashboard</h1>
            <p>Monitor and manage your Telegram bot users and statistics</p>
        </div>
        
        <div class="stats-grid" id="statsContainer">
            <div class="loading">Loading statistics...</div>
        </div>
        
        <div class="users-section">
            <h2>Users</h2>
            <div id="usersContainer">
                <div class="loading">Loading users...</div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                const statsContainer = document.getElementById('statsContainer');
                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <div class="number">${data.total_users}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Active Users (7 days)</h3>
                        <div class="number">${data.active_users}</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('statsContainer').innerHTML = 
                    '<div class="error">Failed to load statistics</div>';
            }
        }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                
                const usersContainer = document.getElementById('usersContainer');
                
                if (users.length === 0) {
                    usersContainer.innerHTML = '<p style="color: #999; padding: 20px;">No users yet</p>';
                    return;
                }
                
                const usersList = users.map(user => `
                    <div class="user-item">
                        <div class="user-info">
                            <div class="user-name">${user.first_name || 'Unknown'}</div>
                            <div class="user-username">${user.username ? '@' + user.username : 'No username'}</div>
                        </div>
                        <div style="color: #999; font-size: 14px;">#${user.id}</div>
                    </div>
                `).join('');
                
                usersContainer.innerHTML = `<div class="user-list">${usersList}</div>`;
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersContainer').innerHTML = 
                    '<div class="error">Failed to load users</div>';
            }
        }
        
        // Load data on page load
        window.addEventListener('load', () => {
            loadStats();
            loadUsers();
            
            // Refresh every 30 seconds
            setInterval(() => {
                loadStats();
                loadUsers();
            }, 30000);
        });
    </script>
</body>
</html>
